name: Deploy Test to NAS

on:
  push:
    branches:
      - refactor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: kck9010/kiosk-manager:test

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config << EOF
          Host ssh.kckworld.com
              ProxyCommand cloudflared access ssh --hostname %h
              User kck9010
              StrictHostKeyChecking no
          EOF

      - name: Pull and run test container on NAS
        run: |
          ssh ssh.kckworld.com "
            sudo /usr/local/bin/docker pull kck9010/kiosk-manager:test &&
            sudo /usr/local/bin/docker stop kiosk-manager-test 2>/dev/null || true &&
            sudo /usr/local/bin/docker rm kiosk-manager-test 2>/dev/null || true &&
            sudo /usr/local/bin/docker volume create kiosk-manager-test-data 2>/dev/null || true &&
            sudo /usr/local/bin/docker run -d \
              --name kiosk-manager-test \
              --restart unless-stopped \
              -p 8889:8000 \
              -v kiosk-manager-test-data:/app/data \
              -v /var/run/docker.sock:/var/run/docker.sock \
              --env-file /volume1/web/Python/kiosk-manager/.env \
              kck9010/kiosk-manager:test
          "
