<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title if title else "Kiosk URL Manager" }}</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg: #f3f5f7;
      --surface: #ffffff;
      --text: #1b2838;
      --muted: #65758a;
      --primary: #0a84ff;
      --danger: #d14343;
      --border: #d7dfe7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #ffffff 0%, #f3f5f7 45%, #e8edf2 100%);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      padding: 20px;
    }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    h1, h2, h3 { margin: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-size: 0.9rem; }
    .row-actions { display: flex; gap: 8px; }
    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .field { margin-bottom: 14px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 600; }
    .field input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .field select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      background: #fff;
    }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .albums {
      max-height: 460px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    .albums .album-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 6px;
      margin-bottom: 0;
      cursor: pointer;
    }
    .albums .album-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      flex: 0 0 auto;
    }
    .albums .album-item span {
      line-height: 1.4;
      font-weight: 600;
    }
    .option-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 8px; }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .radio-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0;
      cursor: pointer;
    }
    .radio-item input[type="radio"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .preview {
      word-break: break-all;
      background: #f8fafc;
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 12px;
      color: #0f172a;
    }
    .muted { color: var(--muted); }

    @media (max-width: 840px) {
      .grid-2 { grid-template-columns: 1fr; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
